name: prosauai
title: "ProsaUAI — Agentes WhatsApp"
description: "Plataforma multi-tenant de agentes conversacionais WhatsApp"
lifecycle: building
version: "0.5.0"
repo:
  org: paceautomations
  name: prosauai
  base_branch: develop
  epic_branch_prefix: "epic/prosauai/"
  isolation: branch
tags: [whatsapp, conversational-ai, multi-tenant]
testing:
  startup:
    type: docker
    command: null
    ready_timeout: 120
  health_checks:
    - url: http://localhost:8050/health
      method: GET
      expect_status: 200
      expect_body_contains: '"status"'
      label: API Backend
    - url: http://localhost:3000
      method: GET
      expect_status: 200
      label: Admin Frontend
  urls:
    - url: http://localhost:8050/health
      type: api
      label: Health Check
      expect_status: 200
    - url: http://localhost:8050/api/auth/login
      type: api
      label: Login endpoint
      expect_status: [200, 401]
    - url: http://localhost:3000
      type: frontend
      label: "Root (deve redirecionar para /login)"
      expect_redirect: /login
    - url: http://localhost:3000/login
      type: frontend
      label: Login page
      expect_contains: ["email", "password"]
    - url: http://localhost:8050/webhook/evolution/smoke-instance
      type: api
      label: "Evolution webhook (POST-only — GET probe confirms route registered)"
      expect_status: [404, 405, 401]
    - url: http://localhost:8050/webhook/meta_cloud/smoke-tenant
      type: api
      label: "Meta Cloud verify (GET handshake — missing/invalid token returns 400/403)"
      expect_status: [400, 403, 404, 422]
  required_env:
    - JWT_SECRET
    - ADMIN_BOOTSTRAP_EMAIL
    - ADMIN_BOOTSTRAP_PASSWORD
    - DATABASE_URL
  env_file: .env.example
  journeys_file: testing/journeys.md
