name: madruga-ai
title: "Madruga AI — Architecture Documentation & Spec-to-Code System"
description: "Sistema de documentacao arquitetural e pipeline spec-to-code para plataformas digitais"
lifecycle: development
version: "0.1.0"
repo:
  org: paceautomations
  name: madruga.ai
  base_branch: main
  epic_branch_prefix: "epic/madruga-ai/"
tags: [architecture, documentation, spec-to-code]
# Epic 027 — screen-flow-canvas opt-out (Decision #13, FR-005..010).
# Platform de tooling/orquestração — não há "app de usuário" no sentido tradicional.
screen_flow:
  enabled: false
  skip_reason: |
    Plataforma de tooling/orquestração — não tem "app de usuário" no sentido tradicional.
    O portal Astro é interno (visualização de docs do próprio madruga). Caso queira documentar
    fluxo do portal, reabilitar com base_url=http://localhost:4321 e device_profile=desktop.
testing:
  startup:
    type: npm
    command: "cd portal && npm run dev"
    ready_timeout: 30
  health_checks:
    - url: http://localhost:4321
      method: GET
      expect_status: 200
      label: Portal Dev Server
  urls:
    - url: http://localhost:4321
      type: frontend
      label: Portal Home
      expect_status: 200
    - url: http://localhost:4321/madruga-ai/business/vision/
      type: frontend
      label: Plataforma madruga-ai (vision doc)
      expect_status: 200
  required_env: []
  env_file: null
  journeys_file: testing/journeys.md
