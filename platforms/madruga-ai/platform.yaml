name: madruga-ai
title: "Madruga AI — Architecture Documentation & Spec-to-Code System"
description: "Sistema de documentacao arquitetural e pipeline spec-to-code para plataformas digitais"
lifecycle: development
version: "0.1.0"
repo:
  org: paceautomations
  name: madruga.ai
  base_branch: main
  epic_branch_prefix: "epic/madruga-ai/"
tags: [architecture, documentation, spec-to-code]
testing:
  startup:
    type: npm
    command: "cd portal && npm run dev"
    ready_timeout: 30
  health_checks:
    - url: http://localhost:4321
      method: GET
      expect_status: 200
      label: Portal Dev Server
  urls:
    - url: http://localhost:4321
      type: frontend
      label: Portal Home
      expect_status: 200
    - url: http://localhost:4321/platforms/madruga-ai
      type: frontend
      label: Plataforma madruga-ai
      expect_status: 200
  required_env: []
  env_file: null
  journeys_file: testing/journeys.md
