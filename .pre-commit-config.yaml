# Pre-commit hooks for madruga.ai.
#
# Both hooks below are wired into the standard `pre-commit` stages (T068 of
# epic 027-screen-flow-canvas):
#   - screen-flow-validator: validates platforms/<p>/business/screen-flow.yaml
#     against the closed-vocabulary schema (FR-001..FR-049 except retry).
#   - screen-flow-png-size: rejects committed PNGs > 500KB in business/shots/
#     (FR-034). Git LFS handles diff/storage; this hook gates size.
#
# Fallback when the pre-commit framework is unavailable: a bash hook can be
# wired manually at `.git/hooks/pre-commit` calling the same scripts —
# see epic 027 quickstart.md for the recipe.

repos:
  - repo: local
    hooks:
      - id: screen-flow-validator
        name: Validate screen-flow.yaml against JSON Schema (epic 027)
        entry: python3 .specify/scripts/screen_flow_validator.py
        language: system
        files: 'platforms/.*/business/screen-flow\.yaml$'
        pass_filenames: true

      - id: screen-flow-png-size
        name: Reject PNGs larger than 500KB in business/shots (epic 027)
        entry: python3 .specify/scripts/capture/pre_commit_png_size.py
        language: system
        files: 'platforms/.*/business/shots/.*\.png$'
        pass_filenames: true
