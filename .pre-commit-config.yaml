# Pre-commit hooks for madruga.ai.
# Hooks below are placeholders for epic 027-screen-flow-canvas; the actual
# scripts (`screen_flow_validator.py`, `pre_commit_png_size.py`) land in
# Phase 2 / Phase 6 of the same epic. Until then `pass_filenames: true`
# combined with non-existing entries would block commits, so the hooks
# stay disabled (`stages: [manual]`) and ship enabled in later phases.
#
# Fallback when pre-commit framework is unavailable: a bash hook can be
# wired manually at `.git/hooks/pre-commit` calling the same scripts —
# see epic 027 quickstart.md for the recipe.

repos:
  - repo: local
    hooks:
      - id: screen-flow-validator
        name: Validate screen-flow.yaml against JSON Schema (epic 027)
        entry: python3 .specify/scripts/screen_flow_validator.py
        language: system
        files: 'platforms/.*/business/screen-flow\.yaml$'
        pass_filenames: true
        stages: [manual]

      - id: screen-flow-png-size
        name: Reject PNGs larger than 500KB in business/shots (epic 027)
        entry: python3 .specify/scripts/capture/pre_commit_png_size.py
        language: system
        files: 'platforms/.*/business/shots/.*\.png$'
        pass_filenames: true
        stages: [manual]
