name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml copier ruff
      - run: python3 .specify/scripts/platform.py lint --all
      - run: ruff check .specify/scripts/

  likec4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install pyyaml
      - name: Discover platforms and build LikeC4
        run: |
          for dir in platforms/*/; do
            if [ -f "$dir/platform.yaml" ] && [ -d "$dir/model" ]; then
              name=$(basename "$dir")
              echo "::group::Building LikeC4 for $name"
              npx likec4 build "$dir/model/"
              echo "::endgroup::"
            fi
          done

  db-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml pytest
      - run: python3 -m pytest .specify/scripts/tests/ -v

  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install copier pyyaml pytest
      - run: |
          copier copy .specify/templates/platform/ /tmp/ci-test-plat \
            --trust --defaults \
            -d platform_name=ci-test \
            -d platform_title="CI Test Platform" \
            -d platform_description="Automated CI validation" \
            -d lifecycle=design \
            -d register_portal=false
      - run: |
          python3 -c "
          import yaml
          with open('/tmp/ci-test-plat/platform.yaml') as f:
              m = yaml.safe_load(f)
          assert 'pipeline' in m, 'Missing pipeline section'
          assert len(m['pipeline']['nodes']) >= 13, f'Expected >=13 nodes, got {len(m[\"pipeline\"][\"nodes\"])}'
          print('Template validation: PASS')
          "
      - run: python3 -m pytest .specify/templates/platform/tests/ -v

  portal-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - name: Build portal
        working-directory: portal
        run: npm install && npm run build
