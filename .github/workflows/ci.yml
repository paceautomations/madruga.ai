name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: bash .specify/scripts/bash/ci-checks.sh --suite lint

  db-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python3 -m pytest .specify/scripts/tests/ -v --tb=short --timeout=60 --timeout-method=thread --cov=.specify/scripts --cov-report=term-missing

  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Easter boots successfully
        run: |
          setsid python3 .specify/scripts/easter.py > /tmp/easter.log 2>&1 &
          PID=$!
          for i in $(seq 1 10); do
            if grep -q "Uvicorn running" /tmp/easter.log 2>/dev/null; then
              echo "Easter started successfully (${i}s)"
              kill -- -$PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "::error::Easter failed to start within 10s"
          cat /tmp/easter.log
          kill -- -$PID 2>/dev/null || true
          exit 1
      - name: All entrypoints import cleanly
        run: |
          FAILED=0
          for f in easter.py platform_cli.py dag_executor.py post_save.py \
                   skill-lint.py telegram_bot.py \
                   ensure_repo.py implement_remote.py sync_memory.py \
                   hook_post_save.py hook_skill_lint.py memory_consolidate.py; do
            echo "Checking $f..."
            timeout 30 python3 -c "
          import importlib.util, sys
          sys.path.insert(0, '.specify/scripts')
          spec = importlib.util.spec_from_file_location('_check', '.specify/scripts/$f')
          mod = importlib.util.module_from_spec(spec)
          sys.modules['_check'] = mod
          try:
              spec.loader.exec_module(mod)
          except SystemExit:
              pass  # argparse scripts exit on missing args
          finally:
              sys.modules.pop('_check', None)
          " 2>&1 || { echo "::error::Import failed: $f"; FAILED=1; }
          done
          exit $FAILED

  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: |
          copier copy .specify/templates/platform/ /tmp/ci-test-plat \
            --trust --defaults \
            -d platform_name=ci-test \
            -d platform_title="CI Test Platform" \
            -d platform_description="Automated CI validation" \
            -d lifecycle=design \
            -d register_portal=false
      - run: bash .specify/scripts/bash/ci-checks.sh --suite template-tests

  bash-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bash tests
        run: bash .specify/scripts/bash/ci-checks.sh --suite bash-tests

  portal-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - name: Build portal
        working-directory: portal
        run: npm install && npm run build

  size-budget:
    # Bundle-size gate for the screen-flow route (FR-040, FR-041).
    # Triggers only on PRs touching portal/ to skip docs-only diffs.
    # Per-route budgets are locked at portal/.size-limit.json (T114):
    #   - screen-flow JS  → 150 kB ungz (baseline 143.11 kB + 5%)
    #   - screen-flow CSS →  22 kB ungz (baseline 20.64 kB + 5%)
    #   - control-panel CSS → 12 kB ungz (regression guard, FR-041)
    # T115 adds JSON capture + a sticky PR comment so reviewers see
    # the budget delta inline without digging into Action logs.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect portal changes
        id: scope
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" -- portal/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.scope.outputs.changed == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - name: Install portal deps
        if: steps.scope.outputs.changed == 'true'
        working-directory: portal
        run: npm ci
      - name: Run size-limit (JSON capture)
        id: size
        if: steps.scope.outputs.changed == 'true'
        working-directory: portal
        # Capture JSON output even if the step fails so the next
        # step can still post a PR comment with the breakdown.
        # `tee` keeps the human-readable log visible in Actions UI.
        run: |
          set +e
          npx size-limit --json | tee size-results.json
          status=${PIPESTATUS[0]}
          # Re-run without --json so the failure message lands in the
          # log surface developers actually read.
          if [ "$status" -ne 0 ]; then
            echo "::error::Bundle size exceeded budget — see portal/.size-limit.json for limits"
            npx size-limit || true
          fi
          exit $status
      - name: Comment size-limit results on PR
        if: steps.scope.outputs.changed == 'true' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'portal/size-results.json';
            if (!fs.existsSync(path)) {
              core.warning('size-results.json not found; skipping comment.');
              return;
            }
            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            const fmtKB = (b) => b == null ? '—' : `${(b / 1024).toFixed(2)} kB`;
            const rows = results.map((r) => {
              const status = r.passed === false ? '❌' : '✅';
              const limit = r.sizeLimit ?? r.limit ?? null;
              const delta = (r.size != null && limit != null)
                ? `${(((r.size - limit) / limit) * 100).toFixed(1)}%`
                : '—';
              return `| ${status} ${r.name} | ${fmtKB(r.size)} | ${fmtKB(limit)} | ${delta} |`;
            }).join('\n');
            const body = [
              '## Bundle size — `size-limit` (T115)',
              '',
              '| | Size | Limit | Δ vs limit |',
              '|-|------|-------|------------|',
              rows,
              '',
              '_Budgets at `portal/.size-limit.json`. Baseline locked at T113._',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const marker = '## Bundle size — `size-limit` (T115)';
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
