name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml copier
      - run: python3 .specify/scripts/platform.py lint --all

  likec4:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [fulano, madruga-ai]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx likec4 build platforms/${{ matrix.platform }}/model/

  db-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml pytest
      - run: python3 -m pytest .specify/scripts/tests/ -v

  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install copier pyyaml
      - run: |
          copier copy .specify/templates/platform/ /tmp/ci-test-plat \
            --defaults \
            -d platform_name=ci-test \
            -d platform_title="CI Test Platform" \
            -d platform_description="Automated CI validation" \
            -d lifecycle=design
      - run: |
          python3 -c "
          import yaml
          with open('/tmp/ci-test-plat/platform.yaml') as f:
              m = yaml.safe_load(f)
          assert 'pipeline' in m, 'Missing pipeline section'
          assert len(m['pipeline']['nodes']) >= 13, f'Expected >=13 nodes, got {len(m[\"pipeline\"][\"nodes\"])}'
          print('Template validation: PASS')
          "
