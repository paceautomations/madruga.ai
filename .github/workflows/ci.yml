name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python3 .specify/scripts/platform.py lint --all
      - run: ruff check .specify/scripts/
      - run: ruff format --check .specify/scripts/

  likec4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install pyyaml
      - name: Discover platforms and build LikeC4
        run: |
          for dir in platforms/*/; do
            if [ -f "$dir/platform.yaml" ] && [ -d "$dir/model" ]; then
              name=$(basename "$dir")
              echo "::group::Building LikeC4 for $name"
              npx likec4 build "$dir/model/"
              echo "::endgroup::"
            fi
          done

  db-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python3 -m pytest .specify/scripts/tests/ -v

  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: |
          copier copy .specify/templates/platform/ /tmp/ci-test-plat \
            --trust --defaults \
            -d platform_name=ci-test \
            -d platform_title="CI Test Platform" \
            -d platform_description="Automated CI validation" \
            -d lifecycle=design \
            -d register_portal=false
      - run: python3 -m pytest .specify/templates/platform/tests/ -v

  bash-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bash tests
        run: bash .specify/scripts/bash/tests/test_base_dir.sh

  portal-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - name: Build portal
        working-directory: portal
        run: npm install && npm run build
