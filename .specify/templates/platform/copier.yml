_min_copier_version: "9.4.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

_skip_if_exists:
  - "decisions.md"
  - "decisions/*"
  - "epics/*"
  - "research/*"
  - "business/vision.md"
  - "business/solution-overview.md"
  - "engineering/domain-model.md"
  - "engineering/blueprint.md"
  - "engineering/context-map.md"
  - "engineering/containers.md"
  - "business/process.md"
  - "engineering/folder-structure.md"
  - "planning/*"
  - "research/codebase-context.md"
  - "research/tech-alternatives.md"
  - "testing/journeys.md"

_exclude:
  - tests/
  - "*.pyc"
  - __pycache__

_tasks:
  - command: "python3 ../../.specify/scripts/platform_cli.py register {{ platform_name }}"
    when: "{{ _copier_operation == 'copy' and register_portal }}"

# ── Questions ──

platform_name:
  type: str
  help: "Nome da plataforma em kebab-case (ex: prosauai, meu-saas)"
  validator: >-
    {% if not platform_name | regex_search('^[a-z][a-z0-9-]*$') %}
    Deve ser kebab-case (minusculas, hifens, comeca com letra)
    {% endif %}

platform_title:
  type: str
  help: "Titulo legivel (ex: 'ProsaUAI — Agentes WhatsApp')"
  default: "{{ platform_name | title }}"

platform_description:
  type: str
  help: "Descricao em uma linha"
  default: "Plataforma {{ platform_name }}"

lifecycle:
  type: str
  help: "Fase atual do ciclo de vida"
  choices:
    Design: design
    Development: development
    Production: production
  default: design

repo_org:
  type: str
  help: "GitHub org (ex: paceautomations)"
  default: "paceautomations"

repo_name:
  type: str
  help: "Repo name (ex: prosauai-api). Deixe vazio se o codigo vive neste repo."
  default: ""

repo_base_branch:
  type: str
  help: "Branch base para PRs (main, develop)"
  default: "main"

tags:
  type: str
  help: "Tags (CSV, opcional, ex: 'whatsapp,multi-tenant'). Vazio = sem tags."
  default: ""

testing_startup_type:
  type: str
  help: "Como o app sobe localmente para testes E2E?"
  choices:
    None (sem testes E2E): none
    Docker Compose: docker
    NPM (package.json): npm
    Python (uvicorn/fastapi): python
  default: none

register_portal:
  type: bool
  help: "Registrar no portal Astro automaticamente?"
  default: true
